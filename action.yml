name: 'layoutd — Solana account layout safety check'
description: 'Detect unsafe Solana account layout changes and block them in CI before they reach production.'
author: 'layoutd'

branding:
  icon: 'shield'
  color: 'green'

inputs:
  old-idl:
    description: 'Path to the old (currently deployed) IDL JSON or Rust source (.rs) file'
    required: true
  new-idl:
    description: 'Path to the new (proposed) IDL JSON or Rust source (.rs) file'
    required: true
  account:
    description: 'Account struct name to check (e.g. "EscrowVault")'
    required: true
  sarif-output:
    description: 'Path to write the SARIF 2.1.0 report (used for GitHub PR annotations)'
    required: false
    default: 'layoutd.sarif'
  zero-copy:
    description: 'Set to "true" to analyse as a repr(C) zero-copy account (stricter rules)'
    required: false
    default: 'false'
  ack-file:
    description: 'Path to a layoutd.ack JSON file; named dangers are allowed through CI'
    required: false
    default: ''
  hints-file:
    description: 'Path to a hints JSON file for explicit rename disambiguation'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Install Rust stable
      uses: dtolnay/rust-toolchain@stable

    - name: Install layoutd
      shell: bash
      # TODO: replace with `cargo install layoutd` once published to crates.io
      run: cargo install --path ${{ github.action_path }}/crates/layoutd-cli --locked

    - name: Run layoutd check
      shell: bash
      # Capture the exit code manually so the SARIF upload step always runs
      # even when dangerous changes are found.
      run: |
        layoutd check \
          "${{ inputs.old-idl }}" \
          "${{ inputs.new-idl }}" \
          --account "${{ inputs.account }}" \
          --sarif   "${{ inputs.sarif-output }}" \
          ${{ inputs.zero-copy == 'true' && '--zero-copy' || '' }} \
          ${{ inputs.ack-file   != '' && format('--ack {0}',   inputs.ack-file)   || '' }} \
          ${{ inputs.hints-file != '' && format('--hints {0}', inputs.hints-file) || '' }} \
          || echo "LAYOUTD_EXIT=1" >> "$GITHUB_ENV"

    - name: Upload SARIF to GitHub
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: ${{ inputs.sarif-output }}
        category: layoutd-${{ inputs.account }}

    - name: Fail on dangerous changes
      shell: bash
      if: env.LAYOUTD_EXIT == '1'
      run: |
        echo "layoutd found dangerous account layout changes. See the Security tab for details."
        exit 1
